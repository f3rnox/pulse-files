name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Keystore encryption scheme (hybrid RSA + AES):
#
#   Encrypt (run locally before committing):
#     openssl rand 32 > aes.key
#     openssl enc -aes-256-cbc -pbkdf2 \
#       -in  release.keystore \
#       -out app/keystore/release.keystore.enc \
#       -pass file:aes.key
#     openssl pkeyutl -encrypt -pubin \
#       -inkey encryption_public_key.pem \
#       -in  aes.key \
#       -out app/keystore/release.keystore.key.enc
#     rm aes.key
#     git add app/keystore/release.keystore.enc \
#             app/keystore/release.keystore.key.enc
#
#   Required GitHub secrets:
#     ENCRYPTION_PRIVATE_KEY  – RSA private key, base64-encoded: base64 -w0 private_key.pem
#     KEYSTORE_PASSWORD       – keystore store password
#     KEY_ALIAS               – optional signing key alias (required only if the keystore has multiple keys)
#     KEY_PASSWORD            – signing key password

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Validate secrets
        env:
          ENCRYPTION_PRIVATE_KEY: ${{ secrets.ENCRYPTION_PRIVATE_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=()
          [ -z "$ENCRYPTION_PRIVATE_KEY" ] && missing+=("ENCRYPTION_PRIVATE_KEY")
          [ -z "$KEYSTORE_PASSWORD" ]      && missing+=("KEYSTORE_PASSWORD")
          [ -z "$KEY_PASSWORD" ]           && missing+=("KEY_PASSWORD")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them at Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Decrypt keystore
        env:
          ENCRYPTION_PRIVATE_KEY: ${{ secrets.ENCRYPTION_PRIVATE_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$ENCRYPTION_PRIVATE_KEY" | base64 -d > "$RUNNER_TEMP/private_key.pem"
          openssl pkeyutl -decrypt \
            -inkey "$RUNNER_TEMP/private_key.pem" \
            -in app/keystore/release.keystore.key.enc \
            -out "$RUNNER_TEMP/aes.key"
          openssl enc -aes-256-cbc -pbkdf2 -d \
            -in app/keystore/release.keystore.enc \
            -out "$RUNNER_TEMP/release.keystore" \
            -pass "file:$RUNNER_TEMP/aes.key"
          keytool -list \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "$KEYSTORE_PASSWORD" > /dev/null

          mapfile -t private_key_aliases < <(
            keytool -list -v \
              -keystore "$RUNNER_TEMP/release.keystore" \
              -storepass "$KEYSTORE_PASSWORD" |
              awk '
                /^Alias name: / { alias_name = substr($0, 13) }
                /^Entry type: PrivateKeyEntry/ && alias_name != "" { print alias_name }
              '
          )

          if [ ${#private_key_aliases[@]} -eq 0 ]; then
            echo "::error::No private key entries found in the release keystore."
            exit 1
          fi

          signing_alias="$KEY_ALIAS"
          alias_matches=false
          if [ -n "$signing_alias" ]; then
            for private_key_alias in "${private_key_aliases[@]}"; do
              if [ "$private_key_alias" = "$signing_alias" ]; then
                alias_matches=true
                break
              fi
            done
          fi

          if [ "$alias_matches" = true ]; then
            echo "Using configured signing alias."
          elif [ ${#private_key_aliases[@]} -eq 1 ]; then
            if [ -n "$signing_alias" ]; then
              echo "::warning::KEY_ALIAS does not match a private key in the keystore; using the only private key alias found."
            else
              echo "Using the only private key alias found in the keystore."
            fi
            signing_alias="${private_key_aliases[0]}"
          else
            echo "::error::KEY_ALIAS must match a private key in the release keystore when multiple keys are present."
            exit 1
          fi

          {
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore"
            echo "KEY_ALIAS<<__SIGNING_ALIAS__"
            echo "$signing_alias"
            echo "__SIGNING_ALIAS__"
          } >> "$GITHUB_ENV"

          rm "$RUNNER_TEMP/private_key.pem" "$RUNNER_TEMP/aes.key"

      - name: Build signed release APK and bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body_path: RELEASE_NOTES.md
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
