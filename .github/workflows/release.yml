name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Keystore encryption scheme (hybrid RSA + AES):
#
#   Encrypt (run locally before committing):
#     openssl rand 32 > aes.key
#     openssl enc -aes-256-cbc -pbkdf2 \
#       -in  release.keystore \
#       -out app/keystore/release.keystore.enc \
#       -pass file:aes.key
#     openssl pkeyutl -encrypt -pubin \
#       -inkey encryption_public_key.pem \
#       -in  aes.key \
#       -out app/keystore/release.keystore.key.enc
#     rm aes.key
#     git add app/keystore/release.keystore.enc \
#             app/keystore/release.keystore.key.enc
#
#   Required GitHub secrets:
#     ENCRYPTION_PRIVATE_KEY  – RSA private key matching encryption_public_key.pem (PEM, full text)
#     KEYSTORE_PASSWORD       – keystore store password
#     KEY_ALIAS               – signing key alias
#     KEY_PASSWORD            – signing key password

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decrypt keystore
        env:
          ENCRYPTION_PRIVATE_KEY: ${{ secrets.ENCRYPTION_PRIVATE_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "$ENCRYPTION_PRIVATE_KEY" > "$RUNNER_TEMP/private_key.pem"
          openssl pkeyutl -decrypt \
            -inkey "$RUNNER_TEMP/private_key.pem" \
            -in app/keystore/release.keystore.key.enc \
            -out "$RUNNER_TEMP/aes.key"
          openssl enc -aes-256-cbc -pbkdf2 -d \
            -in app/keystore/release.keystore.enc \
            -out "$RUNNER_TEMP/release.keystore" \
            -pass "file:$RUNNER_TEMP/aes.key"
          keytool -list \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -storepass "$KEYSTORE_PASSWORD" > /dev/null
          rm "$RUNNER_TEMP/private_key.pem" "$RUNNER_TEMP/aes.key"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated signed release build from commit ${{ github.sha }}.
          files: app/build/outputs/apk/release/app-release.apk
